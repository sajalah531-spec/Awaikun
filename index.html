<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awa AI</title>
<style>
body{background:#0b0b0b;color:#fff;font-family:system-ui;margin:0;display:flex;justify-content:center;align-items:center;height:100vh}
.chat{width:100%;max-width:700px;height:90vh;background:#1c1c1c;border-radius:20px;display:flex;flex-direction:column;overflow:hidden}
.header{padding:16px;border-bottom:1px solid #333;display:flex;gap:12px;align-items:center}
.header img{width:44px;height:44px;border-radius:50%}
.messages{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.bubble{padding:14px 18px;border-radius:18px;max-width:80%;white-space:pre-wrap}
.user{background:#7c3aed;align-self:flex-end;border-radius:18px 18px 6px 18px}
.bot{background:#2a2a2a;align-self:flex-start;border-radius:18px 18px 18px 6px}
.input{display:flex;gap:10px;padding:16px;border-top:1px solid #333}
.input input{flex:1;padding:14px;border-radius:24px;border:1px solid #333;background:#111;color:#fff;outline:none}
.input button{padding:14px 24px;border-radius:24px;border:none;background:#7c3aed;color:#fff;font-weight:600;cursor:pointer}
.input button:disabled{opacity:.5}
</style>
</head>
<body>
<div class="chat">
  <div class="header">
    <img src="https://i.imgur.com/EbNXczP.jpeg" alt="Awa">
    <h3>Awa AI</h3>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input">
    <input id="userInput" placeholder="Mau curhat apa?" autocomplete="off">
    <button id="sendBtn">Kirim</button>
  </div>
</div>

<script>
const messages = document.getElementById('messages');
const input = document.getElementById('userInput');
const btn = document.getElementById('sendBtn');
const USER_ID = "user-" + Math.random().toString(36).substr(2, 9);

async function sendMessage() {
  const text = input.value.trim();
  if(!text) return;
  
  messages.innerHTML += `<div class="bubble user">${text}</div>`;
  input.value = '';
  btn.disabled = true;

  messages.innerHTML += `<div class="bubble bot" id="typing">...</div>`;

  const res = await fetch('/api/chat', { 
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ inputs: {}, query: text, response_mode: "blocking", user: USER_ID })
  });
  
  const data = await res.json();
  document.getElementById('typing').remove();
  messages.innerHTML += `<div class="bubble bot">${data.answer || 'diam gak mood gw 😑'}</div>`;
  btn.disabled = false;
  messages.scrollTop = messages.scrollHeight;
}

btn.onclick = sendMessage;
input.onkeypress = e => e.key === 'Enter' && sendMessage();
</script>
</body>
  </html>
